[phases.setup]
nixPkgs = ["python310", "nodejs_20"]

[phases.install]
cmds = [
    "cd apps/web && npm ci",
    "cd apps/api && pip install -r requirements.txt"
]

[phases.build]
cmds = [
    "cd apps/web && npm run build",
    "mkdir -p apps/api/static",
    "cp -r apps/web/dist/* apps/api/static/"
]

[start]
cmd = "cd apps/api && uvicorn main:app --host 0.0.0.0 --port $PORT"
